[project]
site_name = "pyhfm - Heat Flow Meter Data Parser"
site_description = "Python package for reading and analyzing Heat Flow Meter (HFM) data files"
site_author = "Grayson Bellamy"
site_url = "https://pyhfm.graysonbellamy.dev/"

repo_name = "GraysonBellamy/pyhfm"
repo_url = "https://github.com/GraysonBellamy/pyhfm"
edit_uri = "edit/main/docs/"

copyright = """
Copyright &copy; 2024-2025 Grayson Bellamy -
<a href="https://github.com/GraysonBellamy/pyhfm/blob/main/LICENSE.txt">MIT License</a>
"""

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "User Guide" = "user-guide.md" },
  { "API Reference" = "api-reference.md" },
  { "Troubleshooting" = "troubleshooting.md" },
  { "Contributing" = "contributing.md" },
]

extra_css = ["stylesheets/extra.css"]
extra_javascript = ["javascripts/extra.js"]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
language = "en"
logo = "https://img.icons8.com/color/48/000000/heat.png"
favicon = "https://img.icons8.com/color/32/000000/heat.png"
features = [
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.sections",
  "navigation.expand",
  "navigation.top",
  "navigation.tracking",
  "navigation.instant",
  "navigation.instant.progress",
  "search.highlight",
  "search.share",
  "search.suggest",
  "content.code.copy",
  "content.code.annotate",
  "content.tabs.link",
  "content.action.edit",
  "content.action.view",
  "toc.follow",
  "toc.integrate",
]

[project.theme.icon]
repo = "fontawesome/brands/github"
edit = "material/pencil"
view = "material/eye"

[[project.theme.palette]]
scheme = "default"
primary = "blue"
accent = "teal"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "blue"
accent = "teal"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# Social links
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/solid/house"
link = "https://graysonbellamy.dev"
name = "graysonbellamy.dev"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/GraysonBellamy/pyhfm"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/pyhfm/"

# ----------------------------------------------------------------------------
# Plugins
# ----------------------------------------------------------------------------
[project.plugins.search]

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = true
show_root_heading = true
show_root_toc_entry = false
heading_level = 2
members_order = "source"
group_by_category = true
show_category_heading = true
show_if_no_docstring = false

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.critic]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.tilde]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.snippets]
check_paths = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
